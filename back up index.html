<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>v2rayNplus</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon.png">

<style>
:root{
--blue:#00e5ff;
--green:#00e676;
--purple:#7c4dff;
--glass:rgba(255,255,255,0.05);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,sans-serif;
background:#000;
color:#fff;
overflow:hidden;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
animation:fadeOut 1s ease 2s forwards;
}

#splash img{
width:100px;
border-radius:25px;
box-shadow:0 0 30px #00e5ff;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* BG Glow */
body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#00e5ff33,transparent);
top:-200px;
left:-200px;
filter:blur(100px);
}

/* HEADER */
.header{
position:absolute;
top:15px;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:0 20px;
font-size:12px;
color:#aaa;
}

/* CARD */
.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
backdrop-filter:blur(20px);
background:var(--glass);
border-radius:30px;
padding:25px;
width:90%;
max-width:350px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 60px rgba(0,0,0,0.8);
animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* LOGO */
.logo{
width:90px;
border-radius:20px;
margin-bottom:10px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 #00e5ff66}
70%{box-shadow:0 0 0 20px transparent}
100%{box-shadow:0 0 0 0 transparent}
}

/* BUTTON */
.btn{
display:flex;
justify-content:center;
align-items:center;
height:50px;
margin:10px 0;
border-radius:14px;
font-weight:600;
border:none;
cursor:pointer;
transition:0.2s;
}

.btn:active{transform:scale(0.95)}

.btn-vip{background:linear-gradient(135deg,#ffb300,#ff6f00);color:#000;}
.btn-hiddy{background:linear-gradient(135deg,#7c4dff,#536dfe);}
.btn-copy{background:linear-gradient(135deg,#00e676,#00c853);}
.btn-free{background:transparent;border:1px solid #00e5ff;color:#00e5ff;}
.btn-install{background:#222;color:#fff;}

/* STATUS */
.status{
margin-bottom:10px;
font-size:12px;
}

.online{color:#00e676}
.offline{color:#ff3b30}

/* TOAST */
#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#00e676;
color:#000;
padding:10px 20px;
border-radius:20px;
display:none;
}

/* INSTALL BTN */
#installBtn{
display:none;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="icon.png">
<p>Loading...</p>
</div>

<!-- HEADER -->
<div class="header">
<div id="netStatus">...</div>
<div id="time"></div>
</div>

<div class="container">
<div class="card">

<img src="icon.png" class="logo">

<h2>v2rayNplus</h2>

<div class="status" id="statusText">در حال بررسی اتصال...</div>

<a href="https://t.me/vpsonlineplus" class="btn btn-vip">🔥 VIP</a>

<button onclick="connectHiddy()" class="btn btn-hiddy">⚡ اتصال هوشمند</button>

<button onclick="copyConfigs()" class="btn btn-copy">📋 کپی کانفیگ</button>

<a href="https://t.me/v2rayNplus" class="btn btn-free">📡 کانال رایگان</a>

<button id="installBtn" class="btn btn-install">📲 نصب اپ</button>

</div>
</div>

<div id="toast">کپی شد ✅</div>

<script>
const subLink = "clash://install-config?url=https://raw.githubusercontent.com/v2rayNplus/v2rayNplus.github.io/main/configs.txt";

// اتصال
function connectHiddy(){
location.href = subLink;
}

// کپی
async function copyConfigs(){
try {
const r = await fetch("https://raw.githubusercontent.com/v2rayNplus/v2rayNplus.github.io/main/configs.txt");
const t = await r.text();
await navigator.clipboard.writeText(t);

showToast("کپی شد ✅");
} catch(e){
showToast("خطا!");
}
}

// TOAST
function showToast(msg){
const t = document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

// ONLINE STATUS
function updateStatus(){
const el = document.getElementById("statusText");
if(navigator.onLine){
el.innerHTML="🟢 آنلاین";
el.className="status online";
}else{
el.innerHTML="🔴 آفلاین";
el.className="status offline";
}
}
window.addEventListener("online",updateStatus);
window.addEventListener("offline",updateStatus);
updateStatus();

// TIME
setInterval(()=>{
document.getElementById("time").innerText =
new Date().toLocaleTimeString();
},1000);

// INSTALL PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").onclick = async () => {
if(deferredPrompt){
deferredPrompt.prompt();
}
};

// SERVICE WORKER
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
