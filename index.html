<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v2rayNplus | VIP SERVICE</title>
    <style>
        :root { --ios-blue: #007aff; --ios-green: #34c759; --ios-red: #ff3b30; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        body { margin: 0; padding: 0; background: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: -apple-system, sans-serif; color: white; overflow-x: hidden; }
        
        .header-nav { margin-top: 20px; margin-bottom: 5px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        .lang-menu { background: rgba(40,40,42,0.8); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 25px; display: flex; gap: 12px; border: 1px solid rgba(255,255,255,0.1); direction: ltr !important; }
        .lang-btn { cursor: pointer; font-size: 22px; transition: 0.2s; }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; padding-bottom: 120px; } 
        .card { background: #1c1c1e; padding: 30px 20px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); text-align: center; max-width: 350px; width: 90%; animation: fadeInUp 0.6s ease; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        
        h1 { font-size: 28px; margin: 0; font-weight: 700; }
        .subtitle { font-size: 14px; color: #8e8e93; margin: 5px 0 25px 0; }
        
        .btn { display: flex; align-items: center; justify-content: center; height: 52px; margin: 10px 0; border-radius: 15px; text-decoration: none; font-weight: 600; font-size: 15px; border: none; cursor: pointer; font-family: inherit; width: 100%; transition: 0.2s; opacity: 0; animation: fadeInUp 0.4s ease forwards; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.97); }
        
        .btn-vip { background: linear-gradient(135deg, #ffb300, #ff8f00); color: #000; }
        .btn-hiddy { background: #5856d6; color: white; }
        .btn-copy { background: var(--ios-green); color: white; }
        .btn-free { background: rgba(255,255,255,0.12); color: var(--ios-blue); border: 1px solid rgba(0,122,255,0.4); }
        .btn-group { background: var(--ios-red); color: white; }
        .btn-dl { background: #3a3a3c; color: white; }

        .btn:nth-child(3) { animation-delay: 0.1s; } .btn:nth-child(4) { animation-delay: 0.2s; } .btn:nth-child(5) { animation-delay: 0.3s; } .btn:nth-child(6) { animation-delay: 0.4s; } .btn:nth-child(7) { animation-delay: 0.5s; } .btn:nth-child(8) { animation-delay: 0.6s; }


        .version-text { color: #555; font-size: 9px; font-weight: 800; margin-top: 15px; margin-bottom: 2px; letter-spacing: 1px; }
        .daily { font-size: 10px; color: #444; }
        
        #toast { position: fixed; bottom: 30px; background: var(--ios-green); color: black; padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 2000; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px; }
        .modal { background: #1c1c1e; padding: 35px 25px; border-radius: 35px; border: 1px solid #444; max-width: 320px; text-align: center; animation: fadeInUp 0.3s ease; }
        .modal h2 { color: #ffb300; margin-top: 0; font-size: 22px; }
        .modal p { color: #eee; font-size: 15px; line-height: 1.8; margin: 20px 0; }

        @media (orientation: landscape) and (max-height: 500px) {
            .header-nav { margin-top: 10px; } .container { padding-bottom: 20px; }
            .card { padding: 15px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 600px; }
            h1, .subtitle, .version-text, .daily { grid-column: span 2; } .btn { margin: 0; height: 45px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="toast">کپی شد! ✅</div>

<div id="hiddyModal" class="modal-overlay">
    <div class="modal">
        <h2 id="mTitle">توجه کن گلب من</h2>
        <p id="mDesc">قبل از هر چیزی، باید مطمئن بشی که هیدی‌فای رو داری. اگه نصب نیس، برو قسمت دانلود و نسبت به مدل گوشی و دیوایس خودت دانلود و نصب کن.</p>
        <button class="btn btn-hiddy" onclick="confirmHiddy()" id="mBtn">اوکی، حله!</button>
    </div>
</div>

<div class="header-nav">
    <div class="lang-menu">
        <span onclick="changeLang('zh')" class="lang-btn">🇨🇳</span>
        <span onclick="changeLang('ja')" class="lang-btn">🇯🇵</span>
        <span onclick="changeLang('ru')" class="lang-btn">🇷🇺</span>
        <span onclick="changeLang('en')" class="lang-btn">🇺🇸</span>
        <span onclick="changeLang('fa')" class="lang-btn">🇮🇷</span>
    </div>
</div>

<div class="container">
    <div class="card">
        <h1>v2rayNplus</h1>
        <div id="subtitle" class="subtitle">VIP SERVICE</div>
        <a href="https://t.me/vpsonlineplus" target="_blank" class="btn btn-vip"><span id="t1">کانفیگ اختصاصی (VIP)</span></a>
        <button onclick="showHiddy()" class="btn btn-hiddy"><span id="t2">اتصال هوشمند-Hiddify</span></button>
        <button onclick="copyConfigs()" class="btn btn-copy"><span id="t6">کپی کانفیگ‌های رایگان</span></button>
        <a href="https://t.me/v2rayNplus" target="_blank" class="btn btn-free"><span id="t3">کانال کانفیگ‌های رایگان</span></a>
        <a href="https://t.me/v2rayNplus_GP" target="_blank" rel="noopener noreferrer" class="btn btn-group"><span id="t4">گروه رفع اشکال</span></a>
        <a href="download.html" class="btn btn-dl"><span id="t5">دانلود کلاینت</span></a>
        
        <div class="version-text">v2.1.0-PLUS</div>
        <div class="daily">Daily Update</div>
    </div>
</div>

<script>
const subLink = "clash://install-config?url=https://raw.githubusercontent.com/v2rayNplus/v2rayNplus.github.io/main/configs.txt";
const tr = {
    fa: {s:"VIP SERVICE", t1:"کانفیگ اختصاصی (VIP)", t2:"اتصال هوشمند-Hiddify", t3:"کانال کانفیگ‌های رایگان", t4:"گروه رفع اشکال", t5:"دانلود کلاینت", t6:"کپی کانفیگ‌های رایگان", d:"کپی شد! ✅", mt:"توجه کن گلب من", md:"قبل از هر چیزی، باید مطمئن بشی که هیدی‌فای رو داری. اگه نصب نیس، برو قسمت دانلود و نسبت به مدل گوشی و دیوایس خودت دانلود و نصب کن.", mb:"اوکی، حله!"},
    en: {s:"VIP SERVICE", t1:"Buy Private Config", t2:"Connect to Hiddify", t3:"Free Configs Channel", t4:"Support Group", t5:"Download Client", t6:"Copy Free Configs", d:"Copied! ✅", mt:"Attention My Dear", md:"Make sure you have Hiddify installed. If not, go to the download section and install it based on your device model.", mb:"Got it!"},
    ru: {s:"VIP СЕРВИС", t1:"Купить VIP Конфиг", t2:"Подключение-Hiddify", t3:"Бесплатные каналы", t4:"Центр помощи", t5:"Скачать клиент", t6:"Копировать конфиги", d:"Скопировано! ✅", mt:"Внимание!", md:"Убедитесь, что у вас установлен Hiddify. Если нет, перейдите в раздел загрузки.", mb:"Понятно!"},
    zh: {s:"VIP服务", t1:"购买专用配置", t2: "连接-Hiddify", t3:"免费频道", t4:"帮助中心", t5:"下载客户端", t6:"复制配置", d:"已复制! ✅", mt:"请注意!", md:"确保您已安装 Hiddify。如果没有，请前往下载部分。", mb:"好的!"},
    ja: {s:"VIPサービス", t1:"VIP設定の購入", t2:"接続-Hiddify", t3:"無料チャンネル", t4:"ヘルپセンター", t5:"ダウンロード", t6:"設定をコピー", d:"コピーしました! ✅", mt:"注意！", md:"Hiddifyがインストールされていることを確認してください。ない場合はダウンロードセクションへ。", mb:"了解！"}
};
let cur = 'fa';

function showHiddy() { document.getElementById('hiddyModal').style.display = 'flex'; }
function confirmHiddy() { document.getElementById('hiddyModal').style.display = 'none'; window.location.href = subLink; }

function changeLang(l) {
    cur = l; const d = tr[l];
    if(!d) return;
    document.getElementById('subtitle').innerText = d.s;
    document.getElementById('mTitle').innerText = d.mt;
    document.getElementById('mDesc').innerText = d.md;
    document.getElementById('mBtn').innerText = d.mb;
    ['t1','t2','t3','t4','t5','t6'].forEach(id => {
        let el = document.getElementById(id);
        if(el) el.innerText = d[id];
    });
    document.body.dir = (l === 'fa') ? 'rtl' : 'ltr';
}

async function copyConfigs() {
    try {
        const r = await fetch("https://raw.githubusercontent.com/v2rayNplus/v2rayNplus.github.io/main/configs.txt");
        const t = await r.text();
        await navigator.clipboard.writeText(t);
        const s = document.getElementById('toast');
        s.innerText = tr[cur].d; s.style.display = 'block';
        setTimeout(() => s.style.display = 'none', 2000);
    } catch (e) { alert("Error!"); }
}
</script>
</body>
</html>
